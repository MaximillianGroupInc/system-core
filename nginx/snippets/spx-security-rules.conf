    # -------------------------------------------------------------------------
    # Security headers — applied globally to all responses from this server.
    # -------------------------------------------------------------------------

    # HSTS — safe default: no includeSubDomains until every subdomain is
    # confirmed HTTPS-ready.  Enabling includeSubDomains prematurely locks all
    # subdomains out of HTTP for the full max-age, which can break services that
    # are not yet on HTTPS.
    # Once all subdomains are verified HTTPS-only, update to:
    #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # See README.md — "HSTS includeSubDomains activation checklist".
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Prevent MIME-type sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking — SAMEORIGIN as legacy control; CSP frame-ancestors is the
    # primary modern control and takes precedence in supporting browsers.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer policy — send origin only on cross-origin requests.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — deny by default; open per-route where required.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), payment=(), accelerometer=(), gyroscope=(), magnetometer=(), publickey-credentials-get=(self), fullscreen=(self)" always;

    # Content-Security-Policy — base policy; tighten per route as needed.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; media-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https:;" always;

    # -------------------------------------------------------------------------
    # User-Agent and GeoIP security checks.
    # Nginx does not support nested if directives.  The geo+UA combined signal
    # is computed using an intermediate flag variable so all checks remain flat.
    # Country is evidence, not identity — never blocked on country alone.
    # -------------------------------------------------------------------------

    # Step 1 — build an intermediate geo flag.
    set $block_geo_ua_combined "";
    if ($high_risk_geo) {
        set $block_geo_ua_combined "_geo";
    }

    # Step 2 — append an UA-empty flag to the combined string.
    if ($http_user_agent = "") {
        set $block_geo_ua_combined "${block_geo_ua_combined}_ua";
    }

    # Step 3 — assign the block reason (last match wins; geo+UA is most specific).
    set $block_reason "";

    # Blank / missing User-Agent — reject by default (Section 11.1).
    if ($http_user_agent = "") {
        set $block_reason "empty_user_agent";
    }

    # Header injection characters in User-Agent (Section 11.2).
    if ($http_user_agent ~* "(\n|\r|<|>|{|}|%0A|%0D)") {
        set $block_reason "ua_header_injection";
    }

    # Known scanner signatures (Section 11.3).
    if ($http_user_agent ~* "(sqlmap|nikto|dirbuster|masscan|nmap)") {
        set $block_reason "scanner_ua";
    }

    # Deprecated legacy IE — common in automated scanner fingerprints.
    if ($http_user_agent ~* "MSIE [678]\.") {
        set $block_reason "legacy_msie";
    }

    # Very old Android — Section 3 blocked browser class.
    if ($http_user_agent ~* "Android [23]\.") {
        set $block_reason "legacy_android";
    }

    # Legacy Opera Mini — Section 3 blocked browser class.
    if ($http_user_agent ~* "Opera Mini") {
        set $block_reason "opera_mini_legacy";
    }

    # Geo + empty UA combined signal — overrides the generic empty_user_agent
    # reason to provide a higher-fidelity signal in Fail2Ban logs.
    # The value "_geo_ua" is only set when $high_risk_geo=1 AND $http_user_agent="".
    if ($block_geo_ua_combined = "_geo_ua") {
        set $block_reason "empty_ua_high_risk_geo";
    }

    # NOTE: $block_reason enforcement (return 403) is applied inside each
    # relevant location block below — NOT at server scope.  This ensures
    # /health (Varnish probe / load-balancer) and /files/ (TUS clients, which
    # send minimal headers per spec §1.5) are unconditionally exempt without
    # any intermediate flag variable or map lookup.

    # -------------------------------------------------------------------------
    # SPARXSTAR edge-auth header sanitisation (Section 9.2 / Section 14.4).
    # Default: all headers evaluate to "" — blocking client spoofing attempts.
    # Trusted Cloudflare Worker path: headers preserved via $pass_sparxstar_*
    # maps — active only when X-Worker-Origin-Secret matches the shared secret
    # defined in /etc/nginx/secrets/worker-secret.conf.
    # Cloudflare IP allowlisting (real_ip_header) + the shared secret provide
    # the two-factor trust verification required for high-trust routes.
    # -------------------------------------------------------------------------
    proxy_set_header X-SPARXSTAR-User       $pass_sparxstar_user;
    proxy_set_header X-SPARXSTAR-Session    $pass_sparxstar_session;
    proxy_set_header X-SPARXSTAR-Roles      $pass_sparxstar_roles;
    proxy_set_header X-SPARXSTAR-Issued     $pass_sparxstar_issued;
    proxy_set_header X-SPARXSTAR-Expires    $pass_sparxstar_expires;
    proxy_set_header X-SPARXSTAR-Site       $pass_sparxstar_site;
    proxy_set_header X-SPARXSTAR-AuthLevel  $pass_sparxstar_authlevel;

    # -------------------------------------------------------------------------
    # Standard proxy headers — protocol context must survive the full pipeline
    # so WordPress canonical logic and Mercator multisite routing work correctly
    # (Section 4.5).
    # X-Forwarded-For is set to $remote_addr (the real visitor IP restored by
    # real_ip_header/CF-Connecting-IP) rather than $proxy_add_x_forwarded_for.
    # This prevents spoofing: any client-supplied X-Forwarded-For is discarded
    # and replaced with the IP Cloudflare confirmed.
    # -------------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Request-ID      $request_id;

    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # UA/geo security enforcement ($block_reason != "") and rate limiting are
    # applied inside each relevant location block below.  /health and /files/
    # do NOT include the check — they are unconditionally exempt.

    # -------------------------------------------------------------------------
    # Health / monitoring endpoint — unconditionally exempt from UA checks and
    # rate limiting.  The Varnish backend probe and load balancers send no
    # User-Agent; this location intentionally omits $block_reason enforcement.
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "OK";
    }

    # -------------------------------------------------------------------------
    # WordPress login — strict inner-guard rate limit (Section 10.2).
    # This is NOT a duplicate of Cloudflare's outer brute-force limits;
    # it protects the origin from direct-to-origin bypass attempts.
    # -------------------------------------------------------------------------
    location = /wp-login.php {
        if ($block_reason != "") { return 403; }
        limit_req zone=wp_login burst=3 nodelay;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # WordPress admin — rate limited; only authenticated sessions reach here.
    # -------------------------------------------------------------------------
    location /wp-admin/ {
        if ($block_reason != "") { return 403; }
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # GraphQL — POST only (Section 12.1).
    # GET queries explicitly disabled: they expose query parameters in server
    # logs, CDN logs, and browser history — a data leakage vector.
    # -------------------------------------------------------------------------
    location /graphql {
        if ($block_reason != "") { return 403; }
        limit_req zone=graphql burst=10 nodelay;

        # Reject all methods except POST and OPTIONS (CORS preflight).
        limit_except POST OPTIONS {
            deny all;
        }

        # Body size limit — prevent CPU-exhaustion via oversized queries.
        client_max_body_size 1m;

        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Submission Core — rate-limited separately; body handling relaxed for
    # multipart payloads preceding TUS session initiation.
    # -------------------------------------------------------------------------
    location /submission {
        if ($block_reason != "") { return 403; }
        limit_req zone=submission burst=10 nodelay;
        client_max_body_size 64m;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # xmlrpc.php — blocked entirely; common brute-force and amplification target.
    # -------------------------------------------------------------------------
    location = /xmlrpc.php {
        deny all;
    }

    # -------------------------------------------------------------------------
    # ACME HTTP-01 / well-known standards — must be accessible before the
    # dotfile deny below.  Let's Encrypt, CAA checks, security.txt, and
    # similar well-known paths all live under /.well-known/.
    # Requests are forwarded to Varnish (→ Apache) so WordPress can serve
    # a security.txt or similar file without shell access.
    # -------------------------------------------------------------------------
    location ^~ /.well-known/ {
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Hidden files (.git, .env, .htaccess, etc.) — never served publicly.
    # Note: /.well-known/ is explicitly allowed above and takes precedence
    # over this block (^~ prefix wins over regex location).
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }

    # -------------------------------------------------------------------------
    # Default — forward all other requests to Varnish.
    # Rate limiting applied here covers all routes not explicitly handled above.
    # -------------------------------------------------------------------------
    location / {
        if ($block_reason != "") { return 403; }
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://varnish_backend;
    }
