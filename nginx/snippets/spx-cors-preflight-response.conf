# =============================================================================
# Shared CORS preflight response — included inside every
#   if ($request_method = OPTIONS) { ... }
# block in nginx/sites-available/system-core.conf.
#
# Per-route values ($cors_preflight_methods, $cors_preflight_allow_headers,
# $cors_preflight_expose_headers) are driven by maps declared in
# /etc/nginx/conf.d/spx-cors-logic.conf so that per-route changes only ever
# require editing that one file.
#
# nginx suppresses add_header when the value is an empty string, so
# Access-Control-Expose-Headers is only emitted for routes whose map entry
# is non-empty (currently only /files/ for TUS).
# =============================================================================
add_header Access-Control-Allow-Origin      $cors_origin                   always;
add_header Access-Control-Allow-Credentials $cors_credentials              always;
add_header Access-Control-Allow-Methods     $cors_preflight_methods        always;
add_header Access-Control-Allow-Headers     $cors_preflight_allow_headers  always;
add_header Access-Control-Expose-Headers    $cors_preflight_expose_headers always;
add_header Access-Control-Max-Age           86400                          always;
add_header Content-Length 0;
return 204;
