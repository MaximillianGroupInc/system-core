# =============================================================================
# NGINX VIRTUAL HOST — system-core.conf
# Perimeter layer: real IP restore, security headers, rate limiting,
# UA filtering, GeoIP risk signal, SPARXSTAR header sanitisation,
# TUS upload proxy, GraphQL POST enforcement, proxy to Varnish.
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP → HTTPS permanent redirect
# Handles any direct-to-origin plain-HTTP requests that bypass Cloudflare.
# -----------------------------------------------------------------------------
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Block non-Cloudflare direct-to-origin access.  Uses the TCP connection IP
    # ($realip_remote_addr) — cannot be spoofed via request headers.
    if ($from_cloudflare = 0) {
        return 403;
    }

    # Health check — loopback health monitors are pre-approved in the
    # $from_cloudflare geo block above (127.0.0.1 / ::1 → 1).  External
    # monitoring services must route through Cloudflare or use a loopback
    # probe on the same host.
    location = /health {
        access_log off;
        return 200 "OK";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# Primary server block — receives trusted edge requests from Cloudflare.
# Cloudflare has already terminated TLS; this block also handles direct HTTPS.
# -----------------------------------------------------------------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name _;

    # -------------------------------------------------------------------------
    # Cloudflare-only origin gate — must be the first check in this block.
    # $from_cloudflare is set by geo $realip_remote_addr in nginx.conf (TCP
    # connection IP, not a spoofable request header).  Loopback is pre-approved.
    # -------------------------------------------------------------------------
    if ($from_cloudflare = 0) {
        return 403;
    }

    # -------------------------------------------------------------------------
    # TLS — minimum TLS 1.2, prefer TLS 1.3.
    # SSLv3, TLS 1.0, TLS 1.1 are disabled.
    # 0-RTT (early data) MUST NOT be enabled — prevents replay attacks on any
    # state-changing endpoint (auth, payments, form submissions).
    # -------------------------------------------------------------------------
    ssl_protocols               TLSv1.2 TLSv1.3;
    ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers   off;
    ssl_session_cache           shared:SSL:10m;
    ssl_session_timeout         1d;
    ssl_session_tickets         off;
    ssl_early_data              off;
    #ssl_verify_client          on;


    ssl_certificate             $cert_file;
    ssl_certificate_key         $key_file;
    #ssl_certificate     /etc/ssl/certs/sparxstar.com.pem;
    #ssl_certificate_key /etc/ssl/private/sparxstar_ecc.key;


    # This points to the single root file for all your certs
    ssl_trusted_certificate   /etc/ssl/cloudflare/origin_ca_ecc_root.pem;

    # Optional: Enable OCSP Stapling (Good for performance)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # -------------------------------------------------------------------------
    # Security headers — applied globally to all responses from this server.
    # -------------------------------------------------------------------------
    # HSTS — includeSubDomains and preload enabled; all hosted domains are
    # confirmed HTTPS-only via Cloudflare.  Preload signals intent to browsers
    # to include this domain in the HSTS preload list.  To submit:
    #   https://hstspreload.org/
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking — SAMEORIGIN as legacy control; CSP frame-ancestors is the
    # primary modern control and takes precedence in supporting browsers.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer policy — send origin only on cross-origin requests.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # XSS filter — legacy signal for older browsers; modern browsers rely on CSP.
    add_header X-XSS-Protection "1; mode=block" always;

    # Cross-Origin isolation headers — tighten process isolation.
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;
    # cross-origin: Mercator SUNRISE alias domains (arbitrary custom domains
    # mapped to sub-sites on this multisite network) must be able to embed
    # images, CSS, and JS served from the primary domain.  same-site would
    # block all <img>, <link>, and <script> loads from alias origins.
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    #add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    # X-cross origin protection again adobe, flash and older script tools
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Permissions policy — uses the per-route $spx_permissions map defined in
    # /etc/nginx/conf.d/spx-permission-logic.conf.  Default denies most APIs;
    # /star-submit-audio/ grants microphone=(self).
    add_header Permissions-Policy $spx_permissions always;

    # Content-Security-Policy — tightly scoped to known external dependencies.
    # /etc/nginx/conf.d/spx-csp-logic.conf.
    # NOTE: 'unsafe-inline' is required in script-src and style-src because
    # WordPress core, WooCommerce, and active plugins inject inline scripts and
    # styles.  Removing these directives would break page rendering.  Nonce/hash
    # adoption requires changes at the WordPress application layer.
    add_header Content-Security-Policy $spx_csp always;

    # -------------------------------------------------------------------------
    # CORS — Mercator SUNRISE domain alias support.
    # Two-tier policy defined in /etc/nginx/conf.d/spx-cors-logic.conf:
    #   Tier 1  $cors_origin      → reflects any HTTPS origin so that public
    #                               (non-credentialed) requests — static assets,
    #                               fonts, public REST reads — succeed from any
    #                               Mercator alias domain.
    #   Tier 2  $cors_credentials → "true" only for origins listed in
    #                               spx-cors-trusted-origins.conf; prevents
    #                               cookie/auth forwarding for unlisted sites.
    # Non-HTTPS or absent Origin  → both vars are "" (headers suppressed).
    # Vary: Origin instructs Cloudflare and intermediate caches to maintain
    # separate cache entries when the response varies by origin.
    # -------------------------------------------------------------------------
    add_header Access-Control-Allow-Origin      $cors_origin      always;
    add_header Access-Control-Allow-Credentials $cors_credentials always;
    add_header Vary                             "Origin"          always;

    # -------------------------------------------------------------------------
    # User-Agent and GeoIP security checks.
    # Nginx does not support nested if directives.  The geo+UA combined signal
    # is computed using an intermediate flag variable so all checks remain flat.
    # Country is evidence, not identity — never blocked on country alone.
    #
    # $block_reason base value comes from the map in
    # /etc/nginx/conf.d/spx-bot-mitigation-logic.conf (handles malformed UA
    # and empty UA from high-risk geo via GeoIP2).  The if blocks below refine
    # it with additional per-request signals.  No reset is needed — the map
    # provides the "" default and any if block that fires overrides it.
    # -------------------------------------------------------------------------

    # Step 1 — build an intermediate geo flag.
    set $block_geo_ua_combined "";
    if ($block_geo) {
        set $block_geo_ua_combined "_geo";
    }

    # Step 2 — append an UA-empty flag to the combined string.
    if ($http_user_agent = "") {
        set $block_geo_ua_combined "${block_geo_ua_combined}_ua";
    }

    # Blank / missing User-Agent — reject by default (Section 11.1).
    if ($http_user_agent = "") {
        set $block_reason "empty_user_agent";
    }

    # Header injection characters in User-Agent (Section 11.2).
    if ($http_user_agent ~* "(\n|\r|<|>|{|}|%0A|%0D)") {
        set $block_reason "ua_header_injection";
    }

    # Known scanner signatures (Section 11.3).
    if ($http_user_agent ~* "(sqlmap|nikto|dirbuster|masscan|nmap)") {
        set $block_reason "scanner_ua";
    }

    # Deprecated legacy IE — common in automated scanner fingerprints.
    if ($http_user_agent ~* "MSIE [678]\.") {
        set $block_reason "legacy_msie";
    }

    # Very old Android — Section 3 blocked browser class.
    if ($http_user_agent ~* "Android [23]\.") {
        set $block_reason "legacy_android";
    }

    # Legacy Opera Mini — Section 3 blocked browser class.
    if ($http_user_agent ~* "Opera Mini") {
        set $block_reason "opera_mini_legacy";
    }

    # Geo + empty UA combined signal — overrides the generic empty_user_agent
    # reason to provide a higher-fidelity signal in Fail2Ban logs.
    # The value "_geo_ua" is only set when $block_geo=1 AND $http_user_agent="".
    if ($block_geo_ua_combined = "_geo_ua") {
        set $block_reason "empty_ua_high_risk_geo";
    }

    # NOTE: $block_reason enforcement (return 403) is applied inside each
    # relevant location block below — NOT at server scope.  This ensures
    # /health (Varnish probe / load-balancer) and /files/ (TUS clients, which
    # send minimal headers per spec §1.5) are unconditionally exempt without
    # any intermediate flag variable or map lookup.

    # -------------------------------------------------------------------------
    # SPARXSTAR edge-auth header sanitisation (Section 9.2 / Section 14.4).
    # Default: all headers evaluate to "" — blocking client spoofing attempts.
    # Trusted Cloudflare Worker path: headers preserved via $pass_sparxstar_*
    # maps — active only when X-Worker-Origin-Secret matches the shared secret
    # defined in /etc/nginx/secrets/worker-secret.conf.
    # Cloudflare IP allowlisting (real_ip_header) + the shared secret provide
    # the two-factor trust verification required for high-trust routes.
    # -------------------------------------------------------------------------
    proxy_set_header X-SPARXSTAR-User       $pass_sparxstar_user;
    proxy_set_header X-SPARXSTAR-Session    $pass_sparxstar_session;
    proxy_set_header X-SPARXSTAR-Roles      $pass_sparxstar_roles;
    proxy_set_header X-SPARXSTAR-Issued     $pass_sparxstar_issued;
    proxy_set_header X-SPARXSTAR-Expires    $pass_sparxstar_expires;
    proxy_set_header X-SPARXSTAR-Site       $pass_sparxstar_site;
    proxy_set_header X-SPARXSTAR-AuthLevel  $pass_sparxstar_authlevel;

    # -------------------------------------------------------------------------
    # Standard proxy headers — protocol context must survive the full pipeline
    # so WordPress canonical logic and Mercator multisite routing work correctly
    # (Section 4.5).
    # X-Forwarded-For is set to $remote_addr (the real visitor IP restored by
    # real_ip_header/CF-Connecting-IP) rather than $proxy_add_x_forwarded_for.
    # This prevents spoofing: any client-supplied X-Forwarded-For is discarded
    # and replaced with the IP Cloudflare confirmed.
    # -------------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Request-ID      $request_id;

    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # -------------------------------------------------------------------------
    # Upstream retry policy — protects against stale keepalive connections and
    # transient upstream errors that produce HTTP 5xx without a PHP log entry.
    #
    # error/timeout: retry on TCP-level failures (stale keepalive reset, etc.)
    # http_500/502/503/504: retry on HTTP-level errors returned by Varnish or
    #   Apache.  This transparently absorbs the "every other request fails"
    #   pattern caused by:
    #     • Varnish synthetic 503 when its Apache backend is momentarily sick.
    #     • WordPress fatal error (500) on a transient PHP-FPM hiccup.
    #   nginx retries idempotent methods by default: GET, HEAD, PUT, DELETE,
    #   OPTIONS, TRACE. Non-idempotent methods such as POST/PATCH are not
    #   retried unless explicitly enabled with `non_idempotent`, so PUT/DELETE
    #   callers should be aware retries can occur on those methods too.
    # Limit to 2 total attempts (1 retry) so a genuinely unhealthy backend
    # fails fast and is not hammered with extra load.
    # -------------------------------------------------------------------------
    proxy_next_upstream       error timeout http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    # UA/geo security enforcement ($block_reason != "") and rate limiting are
    # applied inside each relevant location block below.  /health and /files/
    # do NOT include the check — they are unconditionally exempt.

    # -------------------------------------------------------------------------
    # Health / monitoring endpoint — unconditionally exempt from UA checks and
    # rate limiting.  The Varnish backend probe and load balancers send no
    # User-Agent; this location intentionally omits $block_reason enforcement.
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "OK";
    }

    # -------------------------------------------------------------------------
    # TUS resumable upload endpoint (Section 9.1)
    # Unconditionally exempt from UA checks and rate limiting — $block_reason
    # enforcement is intentionally omitted here.  TUS clients (mobile recorders,
    # upload SDKs) often send no User-Agent per spec §1.5 and must never be
    # blocked by the UA filter.  Rate-limiting large uploads would break
    # resumable sessions on slow African mobile connections (the primary
    # contributor use case).
    # -------------------------------------------------------------------------
    location /files/ {
        # Do NOT buffer the request body — critical for TUS protocol operation.
        proxy_request_buffering off;
        # Do NOT buffer the response — prevents stall on slow connections.
        proxy_buffering         off;
        # Remove body size limit for resumable uploads.
        client_max_body_size    0;
        # Allow long-running TUS sessions (1 hour).
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   75s;

        # CORS preflight — TUS clients on Mercator alias domains send OPTIONS
        # before the first PATCH/POST.  Per-route methods/headers are driven by
        # maps in spx-cors-logic.conf; shared response headers live in the
        # snippet below so all preflight locations stay in sync automatically.
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        # Forward TUS protocol headers to the Node ingestion server.
        proxy_set_header Tus-Resumable    $http_tus_resumable;
        proxy_set_header Upload-Offset    $http_upload_offset;
        proxy_set_header Upload-Length    $http_upload_length;
        proxy_set_header Upload-Metadata  $http_upload_metadata;

        proxy_pass http://tus_node_backend;
    }

    # -------------------------------------------------------------------------
    # WordPress login — strict inner-guard rate limit (Section 10.2).
    # This is NOT a duplicate of Cloudflare's outer brute-force limits;
    # it protects the origin from direct-to-origin bypass attempts.
    # -------------------------------------------------------------------------
    location = /wp-login.php {
        if ($block_reason != "") { return 403; }
        limit_req zone=wp_login burst=3 nodelay;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # WordPress admin — rate limited; only authenticated sessions reach here.
    # -------------------------------------------------------------------------
    location /wp-admin/ {
        if ($block_reason != "") { return 403; }

        # CORS preflight — admin-ajax.php is called cross-origin by Mercator
        # alias sites for authenticated admin operations.
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        limit_req zone=wp_admin burst=150 nodelay;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # GraphQL — POST only (Section 12.1).
    # GET queries explicitly disabled: they expose query parameters in server
    # logs, CDN logs, and browser history — a data leakage vector.
    # -------------------------------------------------------------------------
    location /graphql {
        if ($block_reason != "") { return 403; }
        # burst=30: a single dashboard/admin page-load can issue several parallel
        # GraphQL calls; burst=10 silently dropped them once the allowance ran out.
        limit_req zone=graphql burst=30 nodelay;

        # CORS preflight — answered at the perimeter; does not hit the backend.
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        # Reject all methods except POST (OPTIONS handled above).
        limit_except POST GET HEAD {
            deny all;
        }

        # Body size limit — GraphQL queries can carry large JSON payloads
        # (dictionary seeding, bulk mutations, etc.).
        client_max_body_size 50m;

        # Extend read timeout — large JSON payloads and complex queries can take
        # longer than the server-level default to process and flush.
        proxy_read_timeout 120s;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Submission Core — rate-limited separately; body handling relaxed for
    # multipart payloads preceding TUS session initiation.
    # -------------------------------------------------------------------------
    location /submission {
        if ($block_reason != "") { return 403; }
        limit_req zone=submission burst=50 nodelay;

        # CORS preflight — submission forms on Mercator alias sites POST here.
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        client_max_body_size 100m;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # xmlrpc.php — blocked except for explicitly trusted sources (external
    # administrative host, DigitalOcean VPC private IP, and loopback), allowing
    # required maintenance tools while preventing a common brute-force and
    # amplification target.
    # -------------------------------------------------------------------------
    location = /xmlrpc.php {
        if ($block_reason != "") { return 403; }

        # Allow XML-RPC only from explicitly trusted sources. The private VPC IP
        # (10.116.0.2) is the droplet's own intra-datacenter address and is
        # permitted via the $from_cloudflare geo allowlist alongside loopback.
        allow 134.209.223.131;  # external administrative/automation host
        allow 10.116.0.2;       # DigitalOcean VPC private IP (this droplet)
        allow 127.0.0.1;        # IPv4 loopback
        allow ::1;               # IPv6 loopback
        deny all;

        # No limit_req: this endpoint is reachable only from the three trusted
        # sources above, and bulk operations via WP All Import may issue
        # hundreds of sequential requests per import row (10 000+ rows is
        # normal). Throttling these requests would stall or abort large imports.
        # The IP allowlist above is the primary DoS defence for this path.

        # Route through the shared Varnish upstream; Varnish passes
        # /xmlrpc.php to the origin backend without caching.
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # ACME HTTP-01 / well-known standards — must be accessible before the
    # dotfile deny below.  Let's Encrypt, CAA checks, security.txt, and
    # similar well-known paths all live under /.well-known/.
    # Requests are forwarded to Varnish (→ Apache) so WordPress can serve
    # a security.txt or similar file without shell access.
    # -------------------------------------------------------------------------
    location ^~ /.well-known/ {
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Hidden files (.git, .env, .htaccess, etc.) — never served publicly.
    # Note: /.well-known/ is explicitly allowed above and takes precedence
    # over this block (^~ prefix wins over regex location).
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }

    # -------------------------------------------------------------------------
    # Media Assets - allow uploads up to 100m, forward to varnish
    # -------------------------------------------------------------------------

    # WP admin async upload — POST only; uses wp_admin rate zone.
    location = /wp-admin/async-upload.php {
        if ($block_reason != "") { return 403; }

        client_max_body_size 100m;

        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        # Reject all methods except POST (OPTIONS handled above).
        limit_except POST OPTIONS {
            deny all;
        }

        limit_req zone=wp_admin burst=150 nodelay;
        proxy_pass http://varnish_backend;
    }

    # WP REST API media — GET/HEAD for reads, POST for uploads, OPTIONS for CORS.
    location ~* ^/wp-json/wp/v2/media {
        if ($block_reason != "") { return 403; }

        client_max_body_size 100m;

        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        # Reject all methods except reads and uploads (OPTIONS handled above).
        limit_except GET HEAD POST OPTIONS {
            deny all;
        }

        limit_req zone=general burst=200 nodelay;
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Static Assets — remove rate limits and forward to varnish.
    # -------------------------------------------------------------------------
    location ~* \.(js|css|avif|webp|png|jpg|jpeg|gif|svg|otf|woff|woff2?|ico|mp3|wav|mpeg)$ {
        proxy_pass http://varnish_backend;
    }

    # -------------------------------------------------------------------------
    # Default — forward all other requests to Varnish.
    # Rate limiting applied here covers all routes not explicitly handled above.
    # -------------------------------------------------------------------------
    location / {
        if ($block_reason != "") { return 403; }

        # CORS preflight — covers REST API (/wp-json/), front-end assets, and
        # all other paths not matched by a more specific location block above.
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/spx-cors-preflight-response.conf;
        }

        limit_req zone=general burst=200 nodelay;
        proxy_pass http://varnish_backend;
    }
}
