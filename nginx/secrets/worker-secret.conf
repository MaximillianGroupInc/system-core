# Worker-to-Origin shared secret — Nginx map include file.
#
# This file is intentionally empty in the repository.
# Before deploying, replace this file with the actual shared secret:
#
#   "your-actual-shared-secret-value"  1;
#
# The secret must match the value set in the Cloudflare Worker
# (stored as a Cloudflare Worker Secret, never committed to source control).
#
# Rotation procedure:
#   1. Generate a new secret: openssl rand -hex 32
#   2. Update this file with the new value
#   3. Update the Cloudflare Worker Secret to match
#   4. Reload Nginx: nginx -s reload
#
# ⚠  NEVER commit the actual secret value to this repository.
#    The placeholder comment lines here are safe to commit.
