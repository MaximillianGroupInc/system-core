# ======================================================================
# SPARXSTAR CERTIFICATE MAP
# Maps $ssl_server_name to the correct certificate and private key for
# each domain hosted on this origin.  Add new domains here AND update
# the geo $from_cloudflare block in nginx.conf when Cloudflare IP ranges
# change:  https://www.cloudflare.com/ips/
# ======================================================================

map $ssl_server_name $cert_file {
    hostnames;

    default                        /etc/ssl/certs/sparxstar.com.pem;

    sparxstar.com                  /etc/ssl/certs/sparxstar.com.pem;
    *.sparxstar.com                /etc/ssl/certs/sparxstar.com.pem;

    aiwestafrica.com               /etc/ssl/certs/aiwestafrica.com.pem;
    *.aiwestafrica.com             /etc/ssl/certs/aiwestafrica.com.pem;

    barbarabarrett.org             /etc/ssl/certs/barbarabarrett.org.pem;
    *.barbarabarrett.org           /etc/ssl/certs/barbarabarrett.org.pem;

    cellularvibrations.com         /etc/ssl/certs/cellularvibrations.com.pem;
    *.cellularvibrations.com       /etc/ssl/certs/cellularvibrations.com.pem;

    casanovaandrosetta.com         /etc/ssl/certs/casanovaandrosetta.com.pem;
    *.casanovaandrosetta.com       /etc/ssl/certs/casanovaandrosetta.com.pem;
}

map $ssl_server_name $key_file {
    hostnames;

    default                        /etc/ssl/private/sparxstar_ecc.key;

    sparxstar.com                  /etc/ssl/private/sparxstar_ecc.key;
    *.sparxstar.com                /etc/ssl/private/sparxstar_ecc.key;

    aiwestafrica.com               /etc/ssl/private/aiwestafrica.com.key;
    *.aiwestafrica.com             /etc/ssl/private/aiwestafrica.com.key;

    barbarabarrett.org             /etc/ssl/private/barbarabarrett.org.key;
    *.barbarabarrett.org           /etc/ssl/private/barbarabarrett.org.key;

    cellularvibrations.com         /etc/ssl/private/cellularvibrations.com.key;
    *.cellularvibrations.com       /etc/ssl/private/cellularvibrations.com.key;

    casanovaandrosetta.com         /etc/ssl/private/casanovaandrosetta.com.key;
    *.casanovaandrosetta.com       /etc/ssl/private/casanovaandrosetta.com.key;
}
