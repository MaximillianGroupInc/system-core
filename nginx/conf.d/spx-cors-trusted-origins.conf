# =============================================================================
# Trusted CORS origins — Access-Control-Allow-Credentials allowlist
#
# This file is included by the map $http_origin $cors_credentials block in
# spx-cors-logic.conf.  Each entry permits the named origin to send cookies
# and HTTP auth tokens on credentialed cross-origin requests (fetch with
# credentials:'include', XHR withCredentials).
#
# Format — one entry per line:
#   "https://alias.example.com"   "true";
#
# Rules:
#   • Scheme must be https:// — plain-http origins must not be trusted.
#   • No trailing slash — "https://foo.com" not "https://foo.com/".
#   • Exact match — no wildcards; the browser sends a single Origin value.
#
# When to add an entry:
#   Mercator SUNRISE alias domains that make *authenticated* cross-origin
#   requests to this origin (e.g. cookie-gated admin-ajax.php calls, REST
#   API calls that rely on WordPress nonce/session cookies) must be listed
#   here.  Static-asset loads (images, CSS, JS) and public REST reads do
#   NOT need an entry — they are served via $cors_origin (Tier 1) without
#   credentials.
# =============================================================================

# Add trusted Mercator alias origins below this line.
# Example:
#   "https://brand.example.com"         "true";
#   "https://another-alias.example.com" "true";
