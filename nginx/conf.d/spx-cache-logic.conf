# ======================================================================
# SPARXSTAR CACHE LOGIC (MIME-Based)
# ======================================================================

map $sent_http_content_type $spx_cache_control {
    default                                 "no-store, no-cache, must-revalidate, max-age=0";

    # Fonts / immutable
    "~*font/"                               "public, max-age=31536000, immutable";

    # Images
    "~*image/"                              "public, max-age=31536000, stale-while-revalidate=86400";

    # CSS / JS
    "~*text/css"                            "public, max-age=604800, stale-while-revalidate=86400";
    "~*javascript"                          "public, max-age=604800, stale-while-revalidate=86400";

    # JSON / manifest / text
    "~*(application/json|application/manifest\+json|text/plain)"  
                                            "public, max-age=2592000, stale-while-revalidate=86400";

    # XML / feeds / sitemap
    "~*(xml|rss|atom|csv)"                  "public, max-age=3600, must-revalidate";

    # Media — do not cache
    "~*(audio|video)"                       "no-store, no-cache, must-revalidate, max-age=0";
}
