# Content-Security-Policy — tightly scoped to known external dependencies.
# NOTE: 'unsafe-inline' is required in script-src and style-src because
# WordPress core, WooCommerce, and active plugins inject inline scripts and
# styles.  Removing these directives would break page rendering.  Nonce/hash
# adoption requires changes at the WordPress application layer.
map $host $spx_csp {
  default "default-src 'self' https://*.sparxstar.com https://sparxstar.com;
   script-src 'self' https://*.sparxstar.com https://sparxstar.com 'unsafe-inline'
       https://analytics.wpmucdn.com
       https://static.cloudflareinsights.com
       https://www.clarity.ms
       https://www.googletagmanager.com
       https://www.google.com
       https://www.gstatic.com
       https://s.ytimg.com
       https://www.youtube.com
       https://js.hs-scripts.com
       https://js.hs-analytics.net
       https://js.hs-banner.com
       https://js.hsforms.net
       https://js.hscollectedforms.net
       https://pixel.byspotify.com
       https://open.spotify.com
       https://js.stripe.com
       https://connect-js.stripe.com
       https://*.js.stripe.com
       https://checkout.stripe.com
       https://maps.googleapis.com
       https://*.paypal.com
       https://*.paypalobjects.com
       https://*.venmo.com
       https://checkout.flutterwave.com;
   style-src 'self' https://*.sparxstar.com https://sparxstar.com 'unsafe-inline'
       https://fonts.googleapis.com
       https://fonts.bunny.net
       https://*.paypal.com
       https://*.paypalobjects.com;
   object-src 'self';
   base-uri 'self';
   connect-src 'self'
       https://analytics3.wpmudev.com
       https://wp-stats.wpmudev.com
       https://pagead2.googlesyndication.com
       https://www.google-analytics.com
       https://region1.google-analytics.com
       https://j.clarity.ms
       https://c.clarity.ms
       https://www.googletagmanager.com
       https://stats.g.doubleclick.net
       https://forms.hsforms.com
       https://forms.hscollectedforms.net
       https://api.hubspot.com
       https://track.hubspot.com
       https://evnt.byspotify.com
       https://api.stripe.com
       https://checkout.stripe.com
       https://maps.googleapis.com
       https://*.paypal.com
       https://*.paypalobjects.com
       https://*.venmo.com
       https://api.flutterwave.com
       https://checkout.flutterwave.com
       https://cdn4.sparxstar.com
       https://cdn8.sparxstar.com;
   font-src 'self' https://*.sparxstar.com https://sparxstar.com data:
       https://fonts.gstatic.com
       https://fonts.bunny.net;
   frame-ancestors 'self';
   frame-src 'self' https://*.sparxstar.com https://sparxstar.com
       https://www.googletagmanager.com
       https://www.google.com
       https://www.youtube.com
       https://www.youtube-nocookie.com
       https://player.vimeo.com
       https://open.spotify.com
       https://app.hubspot.com
       https://forms.hsforms.com
       https://*.js.stripe.com
       https://js.stripe.com
       https://hooks.stripe.com
       https://checkout.stripe.com
       https://connect-js.stripe.com
       https://*.paypal.com
       https://*.paypalobjects.com
       https://checkout.flutterwave.com;
   img-src 'self' https://*.sparxstar.com https://sparxstar.com data: blob:
       https://cdn4.sparxstar.com
       https://cdn8.sparxstar.com
       https://c.clarity.ms
       https://i.ytimg.com
       https://i.vimeocdn.com
       https://f.vimeocdn.com
       https://www.google.com
       https://www.gstatic.com
       https://stats.g.doubleclick.net
       https://track.hubspot.com
       https://forms.hsforms.com
       https://*.hubspotusercontent-na1.net
       https://*.stripe.com
       https://*.paypal.com
       https://*.paypalobjects.com;
   manifest-src 'self';
   media-src 'self' https://*.sparxstar.com https://sparxstar.com
       https://cdn4.sparxstar.com
       https://cdn8.sparxstar.com
       https://open.spotify.com
       https://www.youtube.com
       https://player.vimeo.com;
   worker-src 'self' blob:;"
}
