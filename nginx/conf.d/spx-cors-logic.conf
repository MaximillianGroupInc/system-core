# ======================================================================
# SPARXSTAR CORS LOGIC (Map-Based)
# ======================================================================

# 1. Map the Incoming Origin to a Safe Variable
# If the origin matches your whitelist, we copy it to $spx_cors_origin.
# If it doesn't match, we set it to "" (Empty), effectively blocking CORS.

map $http_origin $spx_cors_origin {
    default "";

    # Allow your own domain (Regex covers https and www)
    "~^https?://([a-z0-9-]+\.)*domain\.com$"       $http_origin;
    "~^https?://([a-z0-9-]+\.)*domain2\.com$"      $http_origin;
    "~^https?://([a-z0-9-]+\.)*domain3\.com$"      $http_origin;
    "~^https?://([a-z0-9-]+\.)*domain4\.org$"      $http_origin;
    "~^https?://([a-z0-9-]+\.)*domain5\.com$"      $http_origin;    
    # Allow Localhost (for development)
    "~^https?://(localhost|127\.0\.0\.1)"          $http_origin;

    # OPTIONAL: Allow All (Wildcard)
    # Use this ONLY if you have a public API.
    # "~^https?://.*"                              $http_origin;
}

# 2. Map Credentials
# If the origin was allowed above, we define the credentials header.
map $spx_cors_origin $spx_cors_creds {
    default "";
    "~." "true";
}
