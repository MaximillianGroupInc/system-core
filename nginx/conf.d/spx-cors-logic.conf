# =============================================================================
# CORS origin validation map
#
# $cors_origin — reflects the request Origin header as
#   Access-Control-Allow-Origin when the origin is an HTTPS URL.
#   Returns "" (suppressed by nginx add_header) for all other origins.
#
# Mercator SUNRISE domain aliases are arbitrary custom domains mapped to
# sub-sites on this WordPress multisite network.  They cannot be enumerated
# here in advance, so any HTTPS origin is reflected.
#
# Security perimeter: the Cloudflare-only origin gate ($from_cloudflare) in
# system-core.conf ensures all traffic has already passed through Cloudflare
# before this layer is reached.  Direct-to-origin HTTP/HTTPS access from
# non-Cloudflare IPs is blocked at the top of every server block.
# =============================================================================
map $http_origin $cors_origin {
    # By default, do not reflect the Origin header.
    default  "";

    # Explicit allowlist of trusted HTTPS origins that may receive
    # credentialed cross-origin responses. Add all required origins here.
    # Example:
    # "https://www.example.com"         $http_origin;
    # "https://admin.example.com"       $http_origin;
    # "https://another-trusted-site.io" $http_origin;
}
