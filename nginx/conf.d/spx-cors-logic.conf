# =============================================================================
# CORS origin maps — two-tier policy
#
# Tier 1  $cors_origin  →  Access-Control-Allow-Origin
#   Reflects any HTTPS origin so that public (non-credentialed) cross-origin
#   requests — static assets, fonts, public REST API reads — succeed from any
#   Mercator SUNRISE alias domain.  Mercator aliases are arbitrary custom
#   domains mapped to sub-sites at provisioning time; they cannot be
#   enumerated here in advance.
#
# Tier 2  $cors_credentials  →  Access-Control-Allow-Credentials
#   "true" ONLY for explicitly trusted origins listed in
#   spx-cors-trusted-origins.conf.  Keeping credentials on an allowlist means
#   that cookies and HTTP auth tokens are never forwarded on behalf of an
#   unlisted third-party HTTPS site — only origins that have been deliberately
#   registered here can make credentialed (cookie-bearing) cross-origin
#   requests and read the authenticated responses.
#
#   Alias domains that need authenticated cross-origin API access
#   (e.g. cookie-gated admin-ajax.php, nonce-verified wp-json calls) MUST be
#   added to spx-cors-trusted-origins.conf alongside this file.
#
# Security perimeter: the Cloudflare-only origin gate ($from_cloudflare) in
# system-core.conf blocks all non-Cloudflare IPs before this layer is
# reached, providing the outer perimeter.  The explicit credentials allowlist
# is the inner perimeter that prevents arbitrary HTTPS origins from reading
# authenticated responses.
# =============================================================================

# Tier 1 — ACAO: reflect any validated HTTPS origin.
map $http_origin $cors_origin {
    default           "";
    ~^https://[^/]+$  $http_origin;
}

# Tier 2 — Credentials: explicit allowlist only.
# Populated by spx-cors-trusted-origins.conf (one entry per line):
#   "https://alias.example.com"  "true";
# An empty map means no origin receives Access-Control-Allow-Credentials.
map $http_origin $cors_credentials {
    default  "";
    include  /etc/nginx/conf.d/spx-cors-trusted-origins.conf;
}

# =============================================================================
# CORS preflight (OPTIONS) per-route parameters.
#
# These maps are keyed on $uri (the normalized request path, no query string)
# and are consumed by /etc/nginx/snippets/cors-preflight-response.conf which
# is included inside every if ($request_method = OPTIONS) block.  Centralising
# here means per-route changes (new allowed method, new header) only ever
# require editing this file rather than every location block.
#
# nginx suppresses an add_header whose value is "" (empty string), so
# $cors_preflight_expose_headers is set to "" for all routes except /files/ —
# the Access-Control-Expose-Headers header will simply not be emitted for
# those routes.
# =============================================================================

# Allowed HTTP methods for cross-origin preflight.
map $uri $cors_preflight_methods {
    # /files/ — TUS resumable upload; also accepts HEAD and PATCH.
    ~^/files/       "GET, POST, OPTIONS, HEAD, PATCH, DELETE";
    # /graphql — POST only; GET deliberately blocked (see Section 12.1).
    ~^/graphql      "POST, OPTIONS";
    # /wp-admin/ — admin-ajax.php is called cross-origin.
    ~^/wp-admin/    "GET, POST, OPTIONS";
    # All other routes — /submission, /wp-json/, catch-all /.
    default         "GET, POST, OPTIONS, PUT, DELETE, PATCH";
}

# Allowed request headers for cross-origin preflight.
map $uri $cors_preflight_allow_headers {
    # /files/ — TUS protocol requires its own header set.
    ~^/files/   "Authorization, Content-Type, Accept, Origin, X-Requested-With, Tus-Resumable, Upload-Offset, Upload-Length, Upload-Metadata, Upload-Defer-Length, Upload-Concat";
    # Admin / API endpoints — no Cache-Control needed.
    ~^/(wp-admin|graphql|submission) "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-WP-Nonce";
    # Default — catch-all (/, /wp-json/, static assets); includes Cache-Control
    # for front-end fetch() calls that set cache directives.
    default     "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-WP-Nonce, Cache-Control";
}

# Exposed response headers for cross-origin preflight.
# Empty string → nginx suppresses the header entirely (not emitted).
# Only /files/ (TUS) needs to advertise response headers to the browser.
map $uri $cors_preflight_expose_headers {
    ~^/files/   "Upload-Offset, Location, Upload-Length, Tus-Version, Tus-Resumable, Tus-Max-Size, Tus-Extension, Upload-Metadata, Upload-Defer-Length, Upload-Concat";
    default     "";
}
