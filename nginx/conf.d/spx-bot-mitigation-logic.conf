# 1. Load the Database and define variables
geoip2 /var/lib/GeoIP/GeoLite2-Country.mmdb {
    auto_reload 5m;
    $geoip2_data_country_code country iso_code;
}

geoip2 /var/lib/GeoIP/GeoLite2-ASN.mmdb {
    auto_reload 5m;
    $geoip2_asn autonomous_system_number;
    $geoip2_asn_org autonomous_system_organization;
}

map $http_cf_ipcountry $geo_country {
    default $http_cf_ipcountry;
    ""      $geoip2_data_country_code;
}

# 2. Define High-Risk Geo Logic (Africa block example)
map $geoip2_data_country_code $block_geo {
    default 0;
    # List ISO codes for high-risk countries here
    NG 1; # Nigeria
    EG 1; # Egypt
    GH 1; # Ghana
    RU 1; # Russia
    CN 1; # China
    VN 1; # Vietnam
    SG 1; # Singapore
    MY 1; # Myanmar
    MM 1; # Malaysia
    BY 1; # Belarus
    IR 1; # Iran
    IQ 1; # Iraq
    SY 1; # Syria
    IN 1; # India
    PK 1; # Pakastan
    AF 1; # Afganistan
    KP 1; # North Korea
    IL 1; # Israel
    UA 1; # Ukraine
    BR 1; # Brazil
    TR 1; # Turkey
    ID 1; # Indonesia
    BD 1; # Bangladesh
    # Add others as needed
}

# 3. User Agent Block Logic (Same as before)
map $http_user_agent $ua_block_type {
    default 0;
    "~*(\\n|\\r|<|>|\\{|\\}|%0A|%0D|sqlmap|nikto|masscan|nmap|dirbuster)" 1;
}

# 4. Combined logic for Empty UA + High Risk Geo
map "$block_geo:$http_user_agent" $empty_ua_geo_block {
    default      0;
    "1:"         1; 
}

# 5. Final Block Reason mapping
map "$ua_block_type:$empty_ua_geo_block" $block_reason {
    "1:0"        "malformed_or_scanner";
    "0:1"        "empty_ua_high_risk_geo";
    "1:1"        "malformed_or_scanner";
    default      "default_none";
}
