# =============================================================================
# NGINX — PERIMETER LAYER
# Role: Real IP restore, protocol sanity, security headers, origin rate-limiting
# Receives trusted edge requests from Cloudflare (TLS already terminated).
# Forwards clean requests to Varnish on port 6081.
# =============================================================================

user  www-data;
worker_processes  auto;

worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

load_module modules/ngx_http_geoip2_module.so;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Load modular logic maps and trust definitions early.
    include /etc/nginx/conf.d/*.conf;

    # -------------------------------------------------------------------------
    # Logging — include CF-Connecting-IP, country, UA, block reason, and
    # request trace ID so Fail2Ban, log parsers, and distributed tracing can
    # correlate entries across layers.
    #
    # Field notes:
    #   real_ip          — TCP connection IP restored by real_ip_from/CF-Connecting-IP
    #                      processing.  This is the field Fail2Ban rules must use.
    #   cf_connecting_ip — raw CF-Connecting-IP header (kept for cross-reference;
    #                      matches real_ip when traffic comes through Cloudflare).
    #   trace_id         — Nginx-generated unique request ID ($request_id);
    #                      forward as X-Request-ID to correlate across Varnish /
    #                      Apache / application logs.
    # -------------------------------------------------------------------------
    log_format sparxstar_telemetry
                    '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'real_ip="$remote_addr" '
                    'cf_connecting_ip="$http_cf_connecting_ip" '
                    'country="$http_cf_ipcountry" '
                    'trace_id="$request_id" '
                    'host="$host" '
                    'block_reason="$block_reason"';

    access_log  /var/log/nginx/access.log  sparxstar_telemetry;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens  off;

    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 256k;

    large_client_header_buffers 4 32k;
    
    # -------------------------------------------------------------------------
    # Default body size limit — applies to all routes not explicitly handled.
    # Individual locations override this:
    #   /files/      → client_max_body_size 0  (unlimited, TUS resumable uploads)
    #   /graphql     → client_max_body_size 1m
    #   /submission  → client_max_body_size 64m
    # The existing production config used 500M globally; 10M is a safer default
    # for unhandled routes while still allowing reasonable API payloads.
    # -------------------------------------------------------------------------
    client_max_body_size 10m;

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
        
    # Compression level (1-9)
    gzip_comp_level     6;

    # Don't compress anything under 256 bytes
    gzip_min_length     256;

    # Compress output of these MIME-types
    gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype
    application/x-font-truetype
    application/x-javascript
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/eot
    font/opentype
    font/otf
    image/svg+xml
    image/x-icon
    image/vnd.microsoft.icon
    text/css
    text/plain
    text/javascript
    text/x-component;

    # Disable gzip for bad browsers
    gzip_disable  "MSIE [1-6]\.(?!.*SV1)";
        
    # -------------------------------------------------------------------------
    # Real IP Restoration — Cloudflare IP ranges.
    # set_real_ip_from / real_ip_header / real_ip_recursive are defined in
    # /etc/nginx/conf.d/spx-cloudflare-trust.conf (auto-generated, do not
    # edit manually).  That file is included above via conf.d/*.conf.
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # Cloudflare-only origin gate — block direct-to-origin bypass.
    #
    # Uses $realip_remote_addr (the actual TCP connection IP after real_ip_from
    # processing), NOT a request header such as CF-Ray.  Request headers can be
    # trivially forged by any client; the TCP connection source cannot.
    #
    # Loopback addresses (127.0.0.1 / ::1) are also allowed so that internal
    # health monitors and local tooling are never blocked.
    #
    # IP ranges must stay in sync with set_real_ip_from in
    # /etc/nginx/conf.d/spx-cloudflare-trust.conf.  Update both when Cloudflare
    # publishes new ranges:  https://www.cloudflare.com/ips/
    #
    # Defence-in-depth: pair this with a host firewall rule that drops all
    # inbound TCP connections on ports 80/443 from non-Cloudflare IPs before
    # they even reach Nginx (e.g. ufw/iptables allow from CF ranges only).
    # -------------------------------------------------------------------------
    geo $realip_remote_addr $from_cloudflare {
        default          0;
        # Loopback — internal health monitors and local tooling
        127.0.0.1        1;
        ::1              1;
        # Cloudflare IPv4 ranges
        103.21.244.0/22  1;
        103.22.200.0/22  1;
        103.31.4.0/22    1;
        104.16.0.0/13    1;
        104.24.0.0/14    1;
        108.162.192.0/18 1;
        131.0.72.0/22    1;
        141.101.64.0/18  1;
        162.158.0.0/15   1;
        172.64.0.0/13    1;
        173.245.48.0/20  1;
        188.114.96.0/20  1;
        190.93.240.0/20  1;
        197.234.240.0/22 1;
        198.41.128.0/17  1;
        # Cloudflare IPv6 ranges
        2400:cb00::/32   1;
        2606:4700::/32   1;
        2803:f800::/32   1;
        2405:b500::/32   1;
        2405:8100::/32   1;
        2a06:98c0::/29   1;
        2c0f:f248::/32   1;
    }

    # -------------------------------------------------------------------------
    # GeoIP country signal and bot-mitigation maps ($block_geo, $ua_block_type,
    # $empty_ua_geo_block, $block_reason) are defined in
    # /etc/nginx/conf.d/spx-bot-mitigation-logic.conf and loaded above via
    # conf.d/*.conf.  The $block_reason variable is further refined per-request
    # by set/if directives in the server block (for legacy browser signals).
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # Worker-to-Origin shared secret trust gate.
    # Allows Cloudflare Workers to pass trusted SPARXSTAR claim headers
    # through the Nginx perimeter without being stripped.
    # The actual secret value must be stored in a separate include file:
    #   /etc/nginx/secrets/worker-secret.conf
    # Format of that file (one line): "your-shared-secret-value" 1;
    # Never commit the secret value in this repository.
    # -------------------------------------------------------------------------
    map $http_x_worker_origin_secret $is_trusted_worker {
        default  0;
        include  /etc/nginx/secrets/worker-secret.conf;
    }

    # Conditional SPARXSTAR header forwarding — strip by default (value ""),
    # preserve only when $is_trusted_worker=1 (verified Worker request).
    # This closes the header-spoofing surface while allowing the CF Worker
    # path to inject the full edge-session claim set (Section 14.3–14.4).
    map $is_trusted_worker $pass_sparxstar_user      { default ""; 1 $http_x_sparxstar_user; }
    map $is_trusted_worker $pass_sparxstar_session   { default ""; 1 $http_x_sparxstar_session; }
    map $is_trusted_worker $pass_sparxstar_roles     { default ""; 1 $http_x_sparxstar_roles; }
    map $is_trusted_worker $pass_sparxstar_issued    { default ""; 1 $http_x_sparxstar_issued; }
    map $is_trusted_worker $pass_sparxstar_expires   { default ""; 1 $http_x_sparxstar_expires; }
    map $is_trusted_worker $pass_sparxstar_site      { default ""; 1 $http_x_sparxstar_site; }
    map $is_trusted_worker $pass_sparxstar_authlevel { default ""; 1 $http_x_sparxstar_authlevel; }

    # -------------------------------------------------------------------------
    # Certificate and key file maps ($cert_file, $key_file) are defined in
    # /etc/nginx/conf.d/spx-certs-logic.conf and loaded above via conf.d/*.conf.
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # Rate-limiting zones — origin-safe inner guard only.
    # Cloudflare handles public-facing generic flood/brute-force limits.
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=wp_login:10m   rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=graphql:10m    rate=300r/m;
    limit_req_zone  $binary_remote_addr  zone=submission:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr  zone=general:20m    rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=wp_admin:10m   rate=40r/s;
            
    # -------------------------------------------------------------------------
    # Upstream backends
    # -------------------------------------------------------------------------
    upstream varnish_backend {
        server 127.0.0.1:6081;
        keepalive 32;
    }
    
    upstream tus_node_backend {
        server 127.0.0.1:1080;
        keepalive 8;
    }
    
    include /etc/nginx/sites-enabled/*;    
}
