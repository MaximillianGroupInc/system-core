# =============================================================================
# NGINX — PERIMETER LAYER
# Role: Real IP restore, protocol sanity, security headers, origin rate-limiting
# Receives trusted edge requests from Cloudflare (TLS already terminated).
# Forwards clean requests to Varnish on port 6081.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging — include CF-Connecting-IP, country, UA, and block reason so
    # Fail2Ban can target actual visitor IPs (not Cloudflare edge nodes).
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'real_ip="$http_cf_connecting_ip" '
                    'country="$http_cf_ipcountry" '
                    'host="$host" '
                    'block_reason="$block_reason"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens  off;

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript
                      application/xml+rss application/atom+xml
                      image/svg+xml;

    # -------------------------------------------------------------------------
    # Real IP Restoration — Cloudflare IP ranges.
    # Verify against https://www.cloudflare.com/ips/ at each infra review.
    # -------------------------------------------------------------------------
    # IPv4 ranges
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    # IPv6 ranges
    set_real_ip_from  2400:cb00::/32;
    set_real_ip_from  2606:4700::/32;
    set_real_ip_from  2803:f800::/32;
    set_real_ip_from  2405:b500::/32;
    set_real_ip_from  2405:8100::/32;
    set_real_ip_from  2a06:98c0::/29;
    set_real_ip_from  2c0f:f248::/32;

    real_ip_header    CF-Connecting-IP;

    # -------------------------------------------------------------------------
    # GeoIP country signal via Cloudflare header (NOT a local GeoIP database).
    # Country is used as a risk signal only — never as a standalone hard block.
    # -------------------------------------------------------------------------
    map $http_cf_ipcountry $high_risk_geo {
        default 0;
        NG      1;
        GH      1;
    }

    # Declare $block_reason so it is known to the log format at parse time.
    # The geo module creates a mutable variable; set directives in server/location
    # blocks override it per-request.
    geo $block_reason {
        default "";
    }

    # Combined geo + empty-UA signal used to avoid nested if blocks in server
    # context (Nginx does not support nested if directives).
    # Value is "_geo_ua" only when both conditions are true.
    # This variable is overridden by set directives in server blocks.
    geo $block_geo_ua_combined {
        default "";
    }

    # -------------------------------------------------------------------------
    # Rate-limiting zones — origin-safe inner guard only.
    # Cloudflare handles public-facing generic flood/brute-force limits.
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=wp_login:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=graphql:10m    rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=submission:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr  zone=general:20m    rate=300r/m;

    # -------------------------------------------------------------------------
    # Upstream backends
    # -------------------------------------------------------------------------
    upstream varnish_backend {
        server 127.0.0.1:6081;
        keepalive 32;
    }

    upstream tus_node_backend {
        server 127.0.0.1:1080;
        keepalive 8;
    }

    include /etc/nginx/sites-enabled/*.conf;
}
