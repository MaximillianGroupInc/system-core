# =============================================================================
# APACHE VIRTUAL HOST — system-core.conf
# Role: WordPress multisite (Mercator SUNRISE domain mapping), WooCommerce,
#       PHP-FPM 8.2, GraphQL endpoint, Submission Core ingestion.
#
# Listens on port 8080 (loopback only — internal trusted transport from Varnish).
# mod_remoteip reconstructs the real visitor IP from X-Forwarded-For.
# SetEnvIf reconstructs HTTPS=on BEFORE WordPress / Mercator loads — required
# so that Mercator SUNRISE domain mapping and WordPress canonical URL logic
# make correct protocol decisions.
# =============================================================================

# Loopback-only listener — never expose port 8080 publicly.
# Listen 127.0.0.1:8080

# -----------------------------------------------------------------------------
# mod_remoteip — reconstruct real visitor IP from Nginx/Varnish forwarding.
# Apache trusts Varnish (127.0.0.1) as the proxy that supplied X-Forwarded-For.
# Without this, WordPress sees 127.0.0.1 for all requests.
# -----------------------------------------------------------------------------
<IfModule mod_remoteip.c>
    RemoteIPHeader          X-Forwarded-For
    RemoteIPInternalProxy   127.0.0.1
</IfModule>

# -----------------------------------------------------------------------------
# PHP-FPM 8.2 — proxy handler for .php files.
# -----------------------------------------------------------------------------
<IfModule mod_proxy_fcgi.c>
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>
</IfModule>

# =============================================================================
# Main virtual host — catches all domain-mapped requests forwarded by Varnish.
# Mercator SUNRISE will handle the actual domain → blog ID mapping internally.
# =============================================================================
<VirtualHost 127.0.0.1:8080>
    # ServerName is deliberately _default_ — Mercator maps all domains.
    ServerName  _default_
    ServerAlias *

    DocumentRoot /var/www/html

    # -------------------------------------------------------------------------
    # HTTPS context reconstruction — MUST execute before WordPress and Mercator
    # load so that is_ssl(), home_url(), and SUNRISE domain mapping return
    # correct protocol-aware values.
    # -------------------------------------------------------------------------
    <IfModule mod_setenvif.c>
        # Reconstruct HTTPS=on from X-Forwarded-Proto (set by Nginx).
        SetEnvIf X-Forwarded-Proto "https" HTTPS=on
        # Also set HTTP_X_FORWARDED_PROTO in the environment for PHP code that
        # inspects $_SERVER['HTTP_X_FORWARDED_PROTO'] directly (e.g. some
        # WordPress HTTPS detection plugins) rather than relying on $_SERVER['HTTPS'].
        SetEnvIf X-Forwarded-Proto "https" HTTP_X_FORWARDED_PROTO=https
        # Reconstruct the forwarded port so wp_guess_url() uses the correct port.
        SetEnvIf X-Forwarded-Port  "(\d+)" HTTP_X_FORWARDED_PORT=$1
    </IfModule>

    # -------------------------------------------------------------------------
    # WordPress document root — standard WordPress multisite configuration.
    # -------------------------------------------------------------------------
    <Directory /var/www/html>
        Options       -Indexes +FollowSymLinks
        AllowOverride All
        Require       all granted

        # Deny direct access to sensitive WordPress internals.
        <Files wp-config.php>
            Require all denied
        </Files>
    </Directory>

    # -------------------------------------------------------------------------
    # Health check endpoint — returns 200 without invoking WordPress or
    # PHP-FPM.  Required by the Varnish backend probe and load-balancer checks.
    #
    # Access is restricted to loopback addresses (127.0.0.1 / ::1) since this
    # vhost itself only binds to 127.0.0.1:8080 — defense in depth.
    #
    # Implementation: Apache serves the static plain-text file at
    # ${DocumentRoot}/health directly (SetHandler default-handler bypasses
    # PHP-FPM).  The file must exist:
    #   echo "OK" > /var/www/html/health && chmod 644 /var/www/html/health
    # -------------------------------------------------------------------------
    <Location /health>
        SetHandler  default-handler
        Require     ip 127.0.0.1 ::1
    </Location>

    # -------------------------------------------------------------------------
    # GraphQL endpoint — POST, GET, and HEAD allowed.
    # GET/HEAD are required so Varnish can populate its persistent-query cache
    # on a cache miss (WP GraphQL GET-based caching). Only anonymous GET
    # requests are cached; POST is used for mutations and non-cached queries.
    # Submission Core and front-end mutations continue to use POST.
    # -------------------------------------------------------------------------
    <Location /graphql>
        <LimitExcept GET HEAD POST OPTIONS>
            Require all denied
        </LimitExcept>
    </Location>

    # -------------------------------------------------------------------------
    # Submission Core / TUS ingestion — large body, no timeout kill.
    # These paths must be kept in sync with the Nginx /files/ and Varnish
    # pipe rules so uploads bypass cache entirely.
    # TUS upload traffic (/files/) is handled entirely at the Nginx layer
    # and piped directly to the TUS Node backend (port 1080) — it never
    # reaches Apache.
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # xmlrpc.php — restricted to loopback and trusted IPs only; prevents
    # brute-force and amplification attacks while allowing tools like
    # WP All Import to function via loopback.
    #   127.0.0.1 / ::1      — IPv4/IPv6 loopback (Nginx → Varnish → Apache)
    #   134.209.223.131      — trusted import/automation server (WP All Import)
    #   10.116.0.2           — trusted private-network peer (DigitalOcean VPC)
    # -------------------------------------------------------------------------
    <Files xmlrpc.php>
        Require ip 127.0.0.1 ::1 134.209.223.131 10.116.0.2
    </Files>

    # -------------------------------------------------------------------------
    # Deny access to hidden files (.git, .env, .htaccess, etc.).
    # -------------------------------------------------------------------------
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # -------------------------------------------------------------------------
    # Deny access to sensitive file extensions.
    # -------------------------------------------------------------------------
    <FilesMatch "\.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$">
        Require all denied
    </FilesMatch>

    # -------------------------------------------------------------------------
    # Cache headers — Apache must NOT override cache headers globally.
    # Per-route cache control is managed by WordPress / WooCommerce plugins.
    # Only explicitly non-cacheable admin paths get a no-store directive here.
    # -------------------------------------------------------------------------
    <IfModule mod_headers.c>
        <LocationMatch "^/wp-(admin|login\.php)">
            Header always set Cache-Control "no-store, no-cache, must-revalidate"
            Header always set Pragma "no-cache"
        </LocationMatch>
    </IfModule>

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    ErrorLog  ${APACHE_LOG_DIR}/system-core-error.log
    CustomLog ${APACHE_LOG_DIR}/system-core-access.log combined

</VirtualHost>
