# /etc/apache2/sites-available/common-settings.conf
#
# MASTER FILE for common settings included from apache2.conf.
# Provides MIME type definitions and charset defaults for all virtual hosts.
#
# NOT included:
#   - HSTS — handled at the Nginx perimeter layer.
#   - Protocols h2 — Varnish communicates with Apache over HTTP/1.1 only.
#   - Logging directives — placed in each VirtualHost configuration.

# --- Environment and Location Settings ---
<IfModule mod_setenv.c>
    # Set a consistent timezone for all applications.
    SetEnv TZ "UTC"
</IfModule>

# Critical security rule to block web access to your .env file.
<Files "\.(env|ini|mo|conf|log|bak|htaccess|example|git|svn)$">
    Require all denied
</Files>

# --- Standard SSL Environment Variables ---
SSLOptions +ExportCertData +StrictRequire
<FilesMatch "\.(cgi|shtml|phtml|php)$">
    SSLOptions +StdEnvVars
</FilesMatch>
<Directory /usr/lib/cgi-bin>
    SSLOptions +StdEnvVars
</Directory>


# --- Comprehensive MIME Type Definitions ---
<IfModule mod_mime.c>
    AddType text/plain txt
    AddType text/html htm html
    AddType text/css css min.css
    AddType application/xhtml+xml xhtml
    AddType application/rtf rtf
    AddType application/atom+xml atom
    AddType application/json json map topojson
    AddType application/ld+json jsonld
    AddType application/rss+xml rss
    AddType application/geo+json geojson
    AddType application/rdf+xml rdf
    AddType application/xml xml
    AddType application/octet-stream bin
    AddType application/vnd.mozilla.xul+xml xul
    AddType application/wasm wasm
    AddType text/javascript js mjs min.js
    AddType application/x-csh csh
    #AddType application/x-httpd-php php
    AddType application/x-sh sh
    AddType application/manifest+json webmanifest
    AddType application/x-web-app-manifest+json webapp
    AddType text/cache-manifest appcache
    AddType font/woff woff
    AddType font/woff2 woff2
    AddType application/vnd.ms-fontobject eot
    AddType font/ttf ttf
    AddType font/collection ttc
    AddType font/otf otf
    AddType image/jpeg jpg jpeg
    AddType image/png png
    AddType image/bmp bmp
    AddType image/svg+xml svg svgz
    AddType image/webp webp
    AddType image/tiff tif tiff
    AddType image/avif avif
    AddType image/avif-sequence avis
    AddType image/x-icon cur ico
    AddType image/heic heic
    AddType image/heif heif
    AddType image/heics heics
    AddType image/heifs heifs
    AddType image/apng apng
    AddType image/gif gif
    AddType video/mpeg mpg mpeg
    AddType video/mp4 mp4 m4v
    AddType video/ogg ogv
    AddType video/webm webm
    AddType video/quicktime mov
    AddType video/x-msvideo avi
    AddType video/x-flv flv
    AddType video/mp2t ts
    AddType video/3gpp 3gp
    AddType video/3gpp2 3gp2
    AddType application/x-mpegURL m3u8
    AddType audio/mp4 f4a f4b m4a
    AddType audio/mpeg mp3
    AddType audio/ogg oga
    AddType audio/wav wav
    AddType audio/aac aac
    AddType audio/flac flac
    AddType audio/webm weba
    AddType audio/3gpp 3gp
    AddType audio/3gpp2 3gp2
    AddType audio/midi mid midi
    AddType audio/x-midi midi
    AddType application/ogg ogx
    AddType application/x-cdf cdf
    AddType audio/x-mpegurl m3u8
    AddType application/vnd.apple.mpegurl m3u8
    AddType audio/mpegurl m3u8
    AddType application/msword doc
    AddType application/vnd.openxmlformats-officedocument.wordprocessingml.document docx
    AddType application/vnd.ms-excel xls
    AddType application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx
    AddType application/vnd.ms-powerpoint ppt
    AddType application/vnd.openxmlformats-officedocument.presentationml.presentation pptx
    AddType application/vnd.visio vsd
    AddType application/vnd.oasis.opendocument.text odt
    AddType application/vnd.oasis.opendocument.spreadsheet ods
    AddType application/vnd.oasis.opendocument.presentation odp
    AddType application/pdf pdf
    AddType application/vnd.amazon.ebook azw
    AddType application/epub+zip epub
    AddType application/x-freearc arc
    AddType application/x-bzip bzip
    AddType application/x-bzip2 bzip2
    AddType application/gzip gz
    AddType application/x-gzip gz
    AddType application/java-archive jar
    AddType application/vnd.rar rar
    AddType application/x-tar tar
    AddType application/x-abiword abw
    AddType application/octet-stream safariextz
    AddType application/x-bb-appworld bbaw
    AddType application/x-chrome-extension crx
    AddType application/x-opera-extension oex
    AddType application/x-xpinstall xpi
    AddType text/calendar ics
    AddType text/markdown markdown md
    AddType text/vcard vcard vcf
    AddType text/vnd.rim.location.xloc xloc
    AddType text/vtt vtt
    AddType text/x-component htc
    AddType text/csv csv

    # Default Charset
    AddDefaultCharset utf-8
    AddCharset utf-8 .appcache .atom .bbaw .css .csv .htc .html .ics .js .json .manifest .map .markdown .md .mjs .rss .topojson .txt .vtt .vcard .vcf .webmanifest .xhtml .xloc .xlst .xml
</IfModule>

# --- Legacy Browser Compatibility ---
# Provides SSL compatibility for very old browsers like Internet Explorer 6.
BrowserMatch "MSIE [2-6]" \
nokeepalive ssl-unclean-shutdown \
downgrade-1.0 force-response-1.0
#----- EOF ------
